Experiment_name: wlasl100_joint_motion

# feeder
dataset: WLASL100
feeder: feeders.feeder.Feeder
train_feeder_args:
  debug: False
  random_choose: True
  window_size: 120
  random_shift: True
  normalization: True
  random_mirror: True
  random_mirror_p: 0.5
  is_vector: False
  lap_pe: False
  bone_stream: False
  motion_stream: True

test_feeder_args:
  random_mirror: False
  normalization: True
  lap_pe: False
  debug: False
  random_choose: False
  window_size: 120
  bone_stream: False
  motion_stream: True

# model
model: model.fstgan.Model
model_args:
  num_class: 100
  num_point: 27
  num_person: 1
  graph: graph.sign_27.Graph
  groups: 16
  block_size: 41
  graph_args:
    labeling_mode: 'spatial'
  inner_dim: 64
  depth: 4
  drop_layers: 2

# optim
weight_decay: 0.0001
base_lr: 0.1
step: [150, 200]

# training
device: [0]
keep_rate: 0.9
only_train_epoch: 1
batch_size: 24
test_batch_size: 24
num_epoch: 250
nesterov: True
warm_up_epoch: 20

wandb: False
wandb_project: SLGTformer First Run
wandb_entity: irvl
wandb_name: WLASL100 Joint Motion

num_worker: 4
save_interval: 5
